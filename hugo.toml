baseURL = "https://blog.luhg.cn/"
defaultContentLanguage = "zh-cn"
title = "Luhong's Blog"
theme = "LoveIt"
enableRobotsTXT = true
enableGitInfo = false
enableEmoji = true
hasCJKLanguage = true
languageCode = "zh-CN"
languageName = "简体中文"
copyright = ""

[permalinks]
  posts = ":contentbasename"

[params]
  defaultTheme = "auto"
  gitRepo = "https://github.com/1104381746/hugo-blog"
  dateFormat = "2006-01-02"
  title = "Luhong's Blog"
  description = "个人技术博客"

  [params.author]
    name = "Luhong"
    email = ""
    link = ""

  [params.header]
    desktopMode = "fixed"
    mobileMode = "auto"
    [params.header.title]
      name = "Luhong's Blog"
      pre = "<i class='far fa-kiss-wink-heart'></i>"

  [params.footer]
    enable = true
    since = 2026
    hugo = true
    copyright = true
    author = true
    icp = ""

  [params.section]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.list]
    paginate = 20
    dateFormat = "01-02"
    rss = 10

  [params.home]
    rss = 10
    [params.home.profile]
      enable = true
      avatarURL = "/hugo-blog/images/avatar.svg"
      title = "Luhong"
      subtitle = "记录技术思考与学习笔记"
      typeit = true
      social = true
    [params.home.posts]
      enable = true
      paginate = 10

  [params.social]
    GitHub = "1104381746"
    RSS = true

  [params.page]
    hiddenFromHomePage = false
    hiddenFromSearch = false
    twemoji = false
    lightgallery = false
    ruby = true
    fraction = true
    fontawesome = true
    rssFullText = false
    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
    [params.page.code]
      copy = true
      maxShownLines = 50
      [params.page.code.render]
        goat = true
        mermaid = true
    [params.page.math]
      enable = false
    [params.page.share]
      enable = true
      Weibo = true
      Twitter = true
    [params.page.comment]
      enable = false
    [params.page.seo]
      images = []

  [params.search]
    enable = true
    type = "fuse"
    contentLength = 4000
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"

[markup]
  [markup.highlight]
    codeFences = true
    guessSyntax = false
    lineNos = false
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 6

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[privacy]
  [privacy.googleAnalytics]
  [privacy.twitter]
  [privacy.youtube]

[languages]
  [languages.zh-cn]
    weight = 1
    languageCode = "zh-CN"
    languageName = "简体中文"
    hasCJKLanguage = true
    copyright = ""
    [languages.zh-cn.menu]
      [[languages.zh-cn.menu.main]]
        weight = 1
        identifier = "posts"
        name = "所有文章"
        url = "/posts/"
      [[languages.zh-cn.menu.main]]
        weight = 2
        identifier = "tags"
        name = "标签"
        url = "/tags/"
      [[languages.zh-cn.menu.main]]
        weight = 3
        identifier = "categories"
        name = "分类"
        url = "/categories/"
      [[languages.zh-cn.menu.main]]
        weight = 4
        identifier = "github"
        name = "GitHub"
        url = "https://github.com/1104381746"
        pre = "<i class='fab fa-github'></i>"
