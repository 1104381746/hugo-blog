name: Deploy Hugo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [blogs-updated]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Sync posts from blogs repo
        run: |
          git clone --depth=1 https://x-access-token:${{ secrets.BLOGS_TOKEN }}@github.com/1104381746/blogs.git /tmp/blogs
          rsync -av --delete /tmp/blogs/blogs/ content/posts/
          find content/posts -name "*.md" -exec sed -i 's/^published: true$/share: true/' {} +
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true
      - name: Build
        run: hugo --minify
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
